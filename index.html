<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>网站首页</title>
    <meta name="description" content="基础导航首页，链接到古籍全文阅读站与黑暗物质人物关系网页。" />
    <style>
      :root {
        --paper: #eef8f7;
        --ink: #183136;
        --muted: #5f7a7f;
        --line: rgba(78, 125, 130, 0.18);
        --accent: #5f97a2;
        --accent-strong: #437984;
        --shadow: 0 24px 60px rgba(40, 84, 90, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        font-family: "Iowan Old Style", "Palatino Linotype", "Songti SC", "STSong", serif;
        background:
          radial-gradient(circle at top left, rgba(137, 198, 201, 0.22), transparent 24%),
          radial-gradient(circle at bottom right, rgba(109, 164, 171, 0.16), transparent 24%),
          linear-gradient(180deg, #f8fcfc 0%, #e7f4f3 100%);
      }

      .portal {
        width: min(720px, 100%);
        padding: 36px 32px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(252, 255, 255, 0.9);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.84rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 2.8rem);
      }

      .intro {
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.8;
      }

      .links {
        display: grid;
        gap: 14px;
        margin-top: 28px;
      }

      .link-card {
        display: block;
        padding: 18px 20px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(238, 247, 246, 0.94));
        color: inherit;
        text-decoration: none;
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          box-shadow 180ms ease;
      }

      .link-card:hover {
        transform: translateY(-1px);
        border-color: rgba(78, 143, 152, 0.26);
        box-shadow: 0 14px 24px rgba(40, 84, 90, 0.08);
      }

      .link-title {
        display: block;
        font-size: 1.15rem;
      }

      .link-meta {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main class="portal">
      <p class="eyebrow">首页</p>
      <h1>内容导航</h1>
      <p class="intro">这里有两个入口：一个进入古籍全文阅读站，一个进入之前的《黑暗物质》人物关系网页。</p>

      <div class="links">
        <a class="link-card" href="./Chinese1/classics.html">
          <span class="link-title">古籍全文阅读站</span>
          <span class="link-meta">进入《声律启蒙》《幼学琼林》《世说新语》《唐诗三百首》《古文观止》的阅读与打印页面。</span>
        </a>

        <a class="link-card" href="./dark/hdm.html">
          <span class="link-title">黑暗物质人物关系网页</span>
          <span class="link-meta">进入《His Dark Materials》人物与关系网络页面。</span>
        </a>

        <a class="link-card" href="./ph/index.html">
          <span class="link-title">西方哲学人物关系网页</span>
          <span class="link-meta">进入西方哲学家时间卷轴页面。</span>
        </a>
      </div>
    </main>
  </body>
</html>
